# local-mdsearch configuration
# Paths are relative to this file unless they start with / or ~

# Qdrant collection name — change this if you run multiple instances
collection: my_docs

# Local Qdrant DB directory (always gitignored)
db_path: .db/

# Ollama embedding settings
embedding:
  url: http://localhost:11434/api/embed
  model: qwen3-embedding:0.6b
  dim: 1024                     # must match the model's output dimension

# Max characters per chunk (heading-aware splitter respects headings first)
chunk_size: 1500

# Directories to index (relative to this file, or absolute)
# Multiple dirs are merged into one collection
dirs:
  - docs/

# Metadata extracted from file paths via Python regex.
# Rules applied in order; ALL matching rules are applied (not first-match-only).
# regex: must have exactly one capturing group
# key:   payload field name stored in Qdrant
# format: optional template; use {1} for the captured group value.
#         Omit to use the captured value directly.
path_meta:
  - regex: '/ol(\d+)/'
    key: ol_version
    format: "ol{1}"           # e.g. path contains /ol9/ → ol_version = "ol9"
  - regex: '/(uek|olam|olcne|olm|shared)/'
    key: product              # captured value used directly

# Fetch subcommand settings
fetch:
  urls_file: urls.md          # markdown file containing [title](url) links
  output_dir: docs/fetched/   # where fetched markdown is saved (under docs/)
  max_workers: 6              # concurrent top-level URL workers (1 = sequential)
  delay: 0                    # extra wait per worker before each top-level fetch
  crawl_delay: 0              # wait between sub-pages within a rel=next chain
  timeout: 30                 # HTTP timeout in seconds
  user_agent: "mdsearch/1.0 local-search-tool"

  # Selectors to strip from fetched HTML before markdown conversion.
  # Omit to use the built-in defaults (DEFAULT_STRIP_SELECTORS in mdsearch.py),
  # which already covers nav/header/footer/aside/script/style/breadcrumb/sidebar/
  # toc/cookie-banner/feedback/copyright. Define this list only to override.

  # Bucket fetched files into subfolders by URL path.
  # First matching rule wins; URLs that match nothing land flat under output_dir.
  # The resulting subfolder shows up in the saved file's path so path_meta
  # rules below can extract metadata like ol_version / product.
  subfolder_rules:
    - regex: '/uek/'
      folder: uek
    - regex: '/oracle-linux/10/'
      folder: ol10
    - regex: '/oracle-linux/9/'
      folder: ol9
    - regex: '/oracle-linux/8/'
      folder: ol8
    - regex: '/oracle-linux-automation-manager'
      folder: olam
    - regex: '/oracle-linux-manager'
      folder: olm
    - regex: '/olcne'
      folder: olcne
    - regex: '/oracle-linux/'  # cross-version Oracle Linux pages (no version segment)
      folder: shared

  # Tags written into each fetched file's frontmatter. Search payload exposes
  # them as `tags`, queryable via `--filter tags=<value>` after ingest.
  # `base_tags` is a fixed prefix appended to every fetched doc.
  base_tags:
    - oracle-linux

  # Topic classifier — first matching rule's `topic` becomes a tag.
  # Edit/extend per knowledge base; the example covers Oracle Linux subjects.
  topic_rules:
    - regex: '/(install|leapp|ibldr)'
      topic: installation
    - regex: '/(security|userauth|firewall|oscap|selinux|openssh|fapolicyd|secure-boot|certmanage)'
      topic: security
    - regex: '/(stordev|fsadmin|xfs|btrfs|/ext|nfs|ocfs2|samba|nbde|gluster)'
      topic: storage
    - regex: '/(network|balancing|vpn|mptcp|dhcp|bind|chrony)'
      topic: networking
    - regex: '/(kvm|virtio)'
      topic: virtualization
    - regex: '/(podman|olcne)'
      topic: containers
    - regex: '/(monitoring|tuned|pcp)'
      topic: performance
    - regex: '/(sos|drgn|corelens|auditing)'
      topic: debugging
    - regex: '/(dtrace|gprofng)'
      topic: tracing
    - regex: '/(boot|systemd|udev|hugepages|cron|cockpit|backup|accessibility)'
      topic: system-management
    - regex: '/(software-management|uln|ksplice)'
      topic: package-management
    - regex: '/relnotes'
      topic: release-notes
    - regex: '/availability'
      topic: high-availability
    - regex: '/asmlib'
      topic: database
    - regex: '/python|/drgn'
      topic: development
